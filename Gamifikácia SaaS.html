<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ranný check-in – SaaS medical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
  background: #0d1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
@keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }
@keyframes ringDraw { from { stroke-dashoffset: var(--circ); } to { stroke-dashoffset: var(--target); } }
@keyframes countUp { from { opacity:0 } to { opacity:1 } }
.fade-up { animation: fadeUp .35s cubic-bezier(.32,.72,0,1) both; }
:root {
  --ink:#0f172a; --muted:#64748b; --faint:#94a3b8; --line:#e8edf3;
  --bg:#f6f8fb; --accent:#0d9488; --accent-wash:#ecfdf9;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const A = "#0d9488";       // teal accent
const INK = "#0f172a";
const MUTED = "#64748b";
const LINE = "#e8edf3";

// ── line icons ────────────────────────────────────────────────
const Ico = ({ name, size=22, c=INK, sw=1.8 }) => {
  const P = {
    moon: <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>,
    wine: <g><path d="M8 22h8M12 15v7M6 3h12l-1 6a5 5 0 0 1-10 0L6 3Z"/><path d="M5.5 8h13"/></g>,
    leaf: <g><path d="M11 20A7 7 0 0 1 4 13c0-5 5-9 16-9 0 9-4 13-9 13Z"/><path d="M4 20c4-5 7-7 12-8"/></g>,
    pulse: <path d="M3 12h4l2.5-7 5 14L17 12h4"/>,
    flame: <path d="M12 2c2 4-2 5-2 8a2 2 0 0 0 4 0c0-1.5 1-2.5 1-2.5 1.5 2 3 4 3 7a6 6 0 1 1-12 0c0-4 4-6 4-9 0-1.5 0-3 0-3.5Z"/>,
    check: <path d="M5 12.5 10 17.5 19 6.5"/>,
    arrow: <path d="M5 12h14M13 6l6 6-6 6"/>,
    trend: <g><path d="M3 17l6-6 4 4 8-8"/><path d="M21 11V7h-4"/></g>,
    sparkle: <path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z"/>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{P[name]}</svg>;
};

// ── steps ─────────────────────────────────────────────────────
const STEPS = [
  { id:"sleep", icon:"moon", label:"Spánok", q:"Ako ste spali?",
    sub:"Kvalita spánku určuje regeneráciu tkanív.", type:"scale4",
    opts:[{l:"Zle",s:0},{l:"Slabo",s:33},{l:"Dobre",s:75},{l:"Výborne",s:100}] },
  { id:"alcohol", icon:"wine", label:"Alkohol", q:"Pili ste včera alkohol?",
    sub:"Alkohol spomaľuje hojenie a zápalovú odpoveď.", type:"yesno" },
  { id:"food", icon:"leaf", label:"Výživa", q:"Ako ste sa stravovali?",
    sub:"Dostatok bielkovín podporuje obnovu svalov.", type:"scale4",
    opts:[{l:"Zle",s:0},{l:"Slabo",s:33},{l:"Dobre",s:75},{l:"Výborne",s:100}] },
  { id:"pain", icon:"pulse", label:"Bolesť", q:"Aká je dnes vaša bolesť?",
    sub:"Numerická škála 0 – 10 (NRS).", type:"pain" },
];

// ── progress ring ─────────────────────────────────────────────
function ScoreRing({ value, size=168, stroke=14, color, delay=0 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const [draw, setDraw] = React.useState(0);
  React.useEffect(() => { const t = setTimeout(()=>setDraw(value), delay); return ()=>clearTimeout(t); }, [value, delay]);
  const off = circ - (draw/100) * circ;
  return (
    <svg width={size} height={size} style={{ transform:'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#eef2f7" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off}
        style={{ transition:'stroke-dashoffset 1.1s cubic-bezier(.32,.72,0,1)' }} />
    </svg>
  );
}

// ── option card (scale4) ──────────────────────────────────────
function ScaleOptions({ opts, selected, onSelect }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      {opts.map((o, i) => {
        const sel = selected === i;
        return (
          <button key={i} onClick={() => onSelect(i)}
            style={{ display:'flex', alignItems:'center', gap:14, width:'100%',
              border:`1.5px solid ${sel ? A : LINE}`, background: sel ? 'var(--accent-wash)' : '#fff',
              borderRadius:16, padding:'16px 16px', cursor:'pointer', fontFamily:'inherit',
              boxShadow: sel ? `0 0 0 3px ${A}1e` : '0 1px 3px rgba(15,23,42,0.04)',
              transition:'all .15s ease' }}>
            {/* score dots */}
            <div style={{ display:'flex', gap:3 }}>
              {[0,1,2,3].map(d => (
                <span key={d} style={{ width:7, height:7, borderRadius:'50%',
                  background: d <= i ? (sel ? A : '#cbd5e1') : '#eef2f7' }} />
              ))}
            </div>
            <span style={{ flex:1, textAlign:'left', fontSize:16, fontWeight:650,
              color: sel ? '#0f5e57' : INK }}>{o.l}</span>
            <span style={{ fontSize:12, fontWeight:700, color: sel ? A : 'var(--faint)',
              fontVariantNumeric:'tabular-nums' }}>+{Math.round(o.s/4)}</span>
            <div style={{ width:22, height:22, borderRadius:'50%', flexShrink:0,
              border:`1.5px solid ${sel ? A : '#d3dbe5'}`, background: sel ? A : '#fff',
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              {sel && <Ico name="check" size={13} c="#fff" sw={2.6} />}
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── main ──────────────────────────────────────────────────────
function App() {
  const [stepIdx, setStepIdx] = React.useState(0);
  const [answers, setAnswers] = React.useState({});
  const [done, setDone] = React.useState(false);
  const [sel, setSel] = React.useState(null);
  const [pain, setPain] = React.useState(2);
  const [animKey, setAnimKey] = React.useState(0);

  const step = STEPS[stepIdx];

  const commit = (scoreVal, rawVal) => {
    setAnswers(a => ({ ...a, [step.id]: { score: scoreVal, raw: rawVal } }));
    if (stepIdx >= STEPS.length - 1) setTimeout(()=>setDone(true), 240);
    else setTimeout(() => { setStepIdx(i=>i+1); setSel(null); setPain(2); setAnimKey(k=>k+1); }, 220);
  };

  const reset = () => { setStepIdx(0); setAnswers({}); setDone(false); setSel(null); setPain(2); setAnimKey(0); };

  // recovery score
  const recovery = React.useMemo(() => {
    const vals = Object.values(answers).map(a => a.score);
    if (!vals.length) return 0;
    return Math.round(vals.reduce((s,v)=>s+v,0) / vals.length);
  }, [answers]);

  const recColor = recovery >= 67 ? '#16a34a' : recovery >= 34 ? '#d97706' : '#dc2626';
  const recLabel = recovery >= 67 ? 'Dobrá pripravenosť' : recovery >= 34 ? 'Stredná pripravenosť' : 'Nízka pripravenosť';

  return (
    <IOSDevice title="">
      <div style={{ height:'100%', background:'var(--bg)', position:'relative', overflow:'hidden' }}>
        {done ? (
          <DoneScreen recovery={recovery} recColor={recColor} recLabel={recLabel}
            answers={answers} onReset={reset} />
        ) : (
          <div key={animKey} className="fade-up" style={{ height:'100%', display:'flex', flexDirection:'column' }}>

            {/* header */}
            <div style={{ padding:'14px 22px 0' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
                <div>
                  <div style={{ fontSize:11, fontWeight:700, color:'var(--faint)', letterSpacing:0.8, textTransform:'uppercase' }}>
                    Ranný check-in
                  </div>
                  <div style={{ fontSize:15, fontWeight:750, color:INK, marginTop:2 }}>Pondelok, 9. jún</div>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:6, background:'#fff',
                  border:`1px solid ${LINE}`, borderRadius:99, padding:'6px 12px',
                  boxShadow:'0 1px 3px rgba(15,23,42,0.04)' }}>
                  <Ico name="flame" size={15} c="#f97316" sw={2} />
                  <span style={{ fontSize:13, fontWeight:800, color:INK, fontVariantNumeric:'tabular-nums' }}>7</span>
                </div>
              </div>
              {/* step bar */}
              <div style={{ display:'flex', gap:5 }}>
                {STEPS.map((s,i) => (
                  <div key={s.id} style={{ flex:1, height:4, borderRadius:99,
                    background: i <= stepIdx ? A : '#e2e8f0', transition:'background .3s ease' }} />
                ))}
              </div>
            </div>

            {/* question */}
            <div style={{ padding:'28px 22px 0' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
                <div style={{ width:42, height:42, borderRadius:13, background:'var(--accent-wash)',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Ico name={step.icon} size={22} c={A} />
                </div>
                <div style={{ fontSize:11.5, fontWeight:700, color:'var(--faint)', letterSpacing:0.8,
                  textTransform:'uppercase' }}>{step.label} · {stepIdx+1}/{STEPS.length}</div>
              </div>
              <div style={{ fontSize:23, fontWeight:800, color:INK, letterSpacing:-0.5, lineHeight:1.18 }}>{step.q}</div>
              <div style={{ fontSize:13.5, color:MUTED, marginTop:7, lineHeight:1.45 }}>{step.sub}</div>
            </div>

            {/* content */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 22px' }}>
              {step.type === 'scale4' && (
                <ScaleOptions opts={step.opts} selected={sel}
                  onSelect={(i)=>{ setSel(i); setTimeout(()=>commit(step.opts[i].s, step.opts[i].l), 200); }} />
              )}

              {step.type === 'yesno' && (
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {[{v:'no',l:'Nie',sc:100,note:'Žiadny alkohol'},{v:'yes',l:'Áno',sc:30,note:'Pil(a) som'}].map(o => {
                    const s = sel === o.v;
                    return (
                      <button key={o.v} onClick={()=>{ setSel(o.v); setTimeout(()=>commit(o.sc, o.v), 200); }}
                        style={{ display:'flex', alignItems:'center', gap:14, width:'100%',
                          border:`1.5px solid ${s ? A : LINE}`, background: s ? 'var(--accent-wash)' : '#fff',
                          borderRadius:16, padding:'18px 16px', cursor:'pointer', fontFamily:'inherit',
                          boxShadow: s ? `0 0 0 3px ${A}1e` : '0 1px 3px rgba(15,23,42,0.04)',
                          transition:'all .15s ease' }}>
                        <span style={{ flex:1, textAlign:'left' }}>
                          <span style={{ display:'block', fontSize:16.5, fontWeight:700, color: s ? '#0f5e57' : INK }}>{o.l}</span>
                          <span style={{ display:'block', fontSize:12.5, color:'var(--faint)', marginTop:2 }}>{o.note}</span>
                        </span>
                        <div style={{ width:22, height:22, borderRadius:'50%', flexShrink:0,
                          border:`1.5px solid ${s ? A : '#d3dbe5'}`, background: s ? A : '#fff',
                          display:'flex', alignItems:'center', justifyContent:'center' }}>
                          {s && <Ico name="check" size={13} c="#fff" sw={2.6} />}
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}

              {step.type === 'pain' && (
                <div>
                  {/* big value */}
                  <div style={{ display:'flex', alignItems:'baseline', justifyContent:'center', gap:6, marginBottom:6 }}>
                    <span style={{ fontSize:64, fontWeight:900, letterSpacing:-2,
                      color: pain<=3?'#16a34a':pain<=6?'#d97706':'#dc2626',
                      fontVariantNumeric:'tabular-nums', lineHeight:1 }}>{pain}</span>
                    <span style={{ fontSize:20, fontWeight:700, color:'var(--faint)' }}>/10</span>
                  </div>
                  <div style={{ textAlign:'center', fontSize:13, fontWeight:650, color:MUTED, marginBottom:24 }}>
                    {pain<=2?'Žiadna alebo mierna':pain<=5?'Mierna bolesť':pain<=7?'Stredná bolesť':'Silná bolesť'}
                  </div>
                  {/* numeric segments */}
                  <div style={{ display:'flex', gap:5, marginBottom:10 }}>
                    {Array.from({length:11}).map((_,n) => {
                      const on = n <= pain;
                      const col = pain<=3?'#16a34a':pain<=6?'#d97706':'#dc2626';
                      return (
                        <button key={n} onClick={()=>setPain(n)}
                          style={{ flex:1, height:44, borderRadius:9, cursor:'pointer', fontFamily:'inherit',
                            border:'none', background: on ? col : '#eef2f7',
                            opacity: on ? (0.4 + 0.6*(n/Math.max(pain,1))) : 1,
                            color: on ? '#fff' : 'var(--faint)', fontSize:12.5, fontWeight:700,
                            transition:'all .12s ease' }}>{n}</button>
                      );
                    })}
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:11.5,
                    fontWeight:600, color:'var(--faint)', marginBottom:24 }}>
                    <span>Žiadna</span><span>Najsilnejšia</span>
                  </div>
                  <button onClick={()=>commit(100 - pain*10, pain)}
                    style={{ width:'100%', border:'none', borderRadius:15, padding:'16px',
                      background:A, color:'#fff', fontSize:16, fontWeight:720, cursor:'pointer',
                      fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                      boxShadow:`0 6px 20px ${A}40` }}>
                    Dokončiť check-in <Ico name="arrow" size={18} c="#fff" sw={2.2} />
                  </button>
                </div>
              )}
            </div>

            <div style={{ textAlign:'center', paddingBottom:22, paddingTop:14 }}>
              <button onClick={()=>commit(50, null)}
                style={{ border:'none', background:'none', cursor:'pointer', fontFamily:'inherit',
                  fontSize:13, fontWeight:600, color:'var(--faint)' }}>Preskočiť otázku</button>
            </div>
          </div>
        )}
      </div>
    </IOSDevice>
  );
}

// ── done / recovery score ─────────────────────────────────────
function DoneScreen({ recovery, recColor, recLabel, answers, onReset }) {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    let raf; const t0 = performance.now();
    const tick = (t) => { const p = Math.min((t-t0)/1100, 1);
      setN(Math.round(recovery * (1-Math.pow(1-p,3))));
      if (p<1) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf);
  }, [recovery]);

  return (
    <div className="fade-up" style={{ height:'100%', display:'flex', flexDirection:'column',
      padding:'18px 22px 22px', overflowY:'auto' }}>
      <div style={{ fontSize:11, fontWeight:700, color:'var(--faint)', letterSpacing:0.8,
        textTransform:'uppercase', marginBottom:2 }}>Dnešná pripravenosť</div>
      <div style={{ fontSize:21, fontWeight:820, color:INK, letterSpacing:-0.5, marginBottom:18 }}>Recovery skóre</div>

      {/* ring */}
      <div style={{ position:'relative', alignSelf:'center', marginBottom:8 }}>
        <ScoreRing value={recovery} color={recColor} delay={150} />
        <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center' }}>
          <div style={{ fontSize:46, fontWeight:900, color:recColor, lineHeight:1,
            fontVariantNumeric:'tabular-nums', letterSpacing:-1 }}>{n}<span style={{fontSize:20}}>%</span></div>
          <div style={{ fontSize:12.5, fontWeight:700, color:MUTED, marginTop:4 }}>{recLabel}</div>
        </div>
      </div>

      {/* streak strip */}
      <div style={{ display:'flex', gap:10, marginTop:14, marginBottom:18 }}>
        <div style={{ flex:1, background:'#fff', border:`1px solid ${LINE}`, borderRadius:14, padding:'12px 14px',
          boxShadow:'0 1px 3px rgba(15,23,42,0.04)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
            <Ico name="flame" size={15} c="#f97316" sw={2} />
            <span style={{ fontSize:11, fontWeight:700, color:'var(--faint)', textTransform:'uppercase', letterSpacing:0.5 }}>Séria</span>
          </div>
          <div style={{ fontSize:22, fontWeight:850, color:INK, fontVariantNumeric:'tabular-nums' }}>7 <span style={{fontSize:12,color:'var(--faint)',fontWeight:600}}>dní</span></div>
        </div>
        <div style={{ flex:1, background:'#fff', border:`1px solid ${LINE}`, borderRadius:14, padding:'12px 14px',
          boxShadow:'0 1px 3px rgba(15,23,42,0.04)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
            <Ico name="trend" size={15} c={A} sw={2} />
            <span style={{ fontSize:11, fontWeight:700, color:'var(--faint)', textTransform:'uppercase', letterSpacing:0.5 }}>Trend</span>
          </div>
          <div style={{ fontSize:22, fontWeight:850, color:'#16a34a', fontVariantNumeric:'tabular-nums' }}>+12<span style={{fontSize:12,color:'var(--faint)',fontWeight:600}}>%</span></div>
        </div>
      </div>

      {/* breakdown */}
      <div style={{ fontSize:11, fontWeight:700, color:'var(--faint)', letterSpacing:0.6,
        textTransform:'uppercase', marginBottom:10 }}>Rozpis faktorov</div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {STEPS.map(s => {
          const a = answers[s.id];
          const sc = a?.score ?? 0;
          const col = sc >= 67 ? '#16a34a' : sc >= 34 ? '#d97706' : '#dc2626';
          return (
            <div key={s.id} style={{ display:'flex', alignItems:'center', gap:12,
              background:'#fff', border:`1px solid ${LINE}`, borderRadius:13, padding:'11px 14px' }}>
              <Ico name={s.icon} size={18} c={MUTED} />
              <span style={{ flex:1, fontSize:14, fontWeight:650, color:INK }}>{s.label}</span>
              <div style={{ width:64, height:6, borderRadius:99, background:'#eef2f7', overflow:'hidden' }}>
                <div style={{ width:`${sc}%`, height:'100%', background:col, borderRadius:99,
                  transition:'width .9s ease' }} />
              </div>
              <span style={{ fontSize:12.5, fontWeight:800, color:col, width:34, textAlign:'right',
                fontVariantNumeric:'tabular-nums' }}>{sc}%</span>
            </div>
          );
        })}
      </div>

      <button onClick={onReset} style={{ marginTop:18, border:`1.5px solid ${LINE}`, background:'#fff',
        borderRadius:15, padding:'15px', color:MUTED, fontSize:14.5, fontWeight:680, cursor:'pointer',
        fontFamily:'inherit' }}>Zopakovať check-in</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
