<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FyzioUnion — pacientská aplikácia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: radial-gradient(120% 100% at 50% 0%, #eef1f6 0%, #e4e8f0 100%);
    -webkit-font-smoothing: antialiased;
    color: #1b2238;
  }
  :root {
    --ink: #1b2238;
    --text: #404a66;
    --muted: #8b91a7;
    --faint: #b3b8c8;
    --bg: #f4f6f9;
    --line: #eaecf2;
    --chip: #f2f4f9;
    --mono: 'Roboto Mono', ui-monospace, monospace;
    --ring-track: #eceef4;
    --nav-idle: #a3a9bb;
    --switch-off: #d8dce6;
    --ok: #1f9e63; --ok-ink: #14794a; --ok-wash: #e8f6ee; --ok-line: #cdeadb;
    --warm: #3b6fe0; --warm-wash: #e9eef9;
    --rest: #5a6b8c; --rest-wash: #eceff5;
    --danger: #39507a;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
  @keyframes fzBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes fzFade { from { transform: translateY(8px); } to { transform: none; } }
  .fz-fade { animation: fzFade .34s cubic-bezier(.32,.72,0,1) both; }
  @keyframes fzMarquee { 0%, 16% { transform: translateX(0); } 84%, 100% { transform: translateX(var(--mq-end)); } }
  @media (prefers-reduced-motion: reduce) { .fz-fade { animation: none; } }
</style>
</head>
